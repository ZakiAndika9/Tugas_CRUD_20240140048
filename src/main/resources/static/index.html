<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Data KTP</title>

    <link rel="stylesheet" href="/css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <h2>🪪 KTP App</h2>

        <ul>
            <li class="active">Dashboard</li>
        </ul>

    </aside>


    <!-- CONTENT -->
    <div class="content">

        <header class="topbar">
            <h1>Data KTP</h1>
        </header>


        <div class="grid">

            <!-- FORM -->
            <div class="card">

                <h2 id="formTitle">Tambah Data KTP</h2>

                <form id="ktpForm">

                    <input type="hidden" id="ktpId">

                    <label>Nomor KTP</label>
                    <input type="text" id="nomorKtp" maxlength="16" required>

                    <label>Nama Lengkap</label>
                    <input type="text" id="namaLengkap" required>

                    <label>Alamat</label>
                    <textarea id="alamat" rows="3"></textarea>

                    <div class="row">

                        <div>
                            <label>Tanggal Lahir</label>
                            <input type="date" id="tanggalLahir">
                        </div>

                        <div>
                            <label>Jenis Kelamin</label>
                            <select id="jenisKelamin">
                                <option value="">-- pilih --</option>
                                <option value="Laki-laki">Laki-laki</option>
                                <option value="Perempuan">Perempuan</option>
                            </select>
                        </div>

                    </div>

                    <div class="actions">

                        <button type="submit" id="btnSubmit" class="btn-primary">
                            Simpan
                        </button>

                        <button type="button" id="btnCancel" class="btn-secondary hidden">
                            Batal
                        </button>

                    </div>

                </form>

            </div>


            <!-- TABLE -->
            <div class="card table-card">

                <div class="table-header">
                    <h2>Daftar Data KTP</h2>
                    <button onclick="loadKtpData()">Refresh</button>
                </div>

                <table id="ktpTable">

                    <thead>
                    <tr>
                        <th>No</th>
                        <th>No KTP</th>
                        <th>Nama</th>
                        <th>Alamat</th>
                        <th>Lahir</th>
                        <th>JK</th>
                        <th>Aksi</th>
                    </tr>
                    </thead>

                    <tbody id="ktpTableBody">

                    <tr>
                        <td colspan="7" class="empty">Belum ada data</td>
                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>


<!-- MODAL -->
<div id="modal" class="modal hidden">
    <div class="modal-content">
        <h3 id="modalTitle"></h3>
        <p id="modalMessage"></p>
        <p id="modalInfo"></p>
        <div id="modalActions"></div>
    </div>
</div>

<script src="/js/app.js"></script>

</body>
</html>
